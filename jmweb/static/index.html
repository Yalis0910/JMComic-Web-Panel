<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JMComic · 漫画库</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;900&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
<link rel="stylesheet" href="/static/css/reader.css">
</head>
<body>
  <div id="app">
    <header class="masthead">
      <div class="masthead-inner">
        <div class="brand">
          <span class="brand-kanji">漫庫</span>
          <span class="brand-sub">JMComic Panel</span>
        </div>
        <nav class="main-nav">
          <a class="nav-item active" data-page="dashboard">仪表盘</a>
          <a class="nav-item" data-page="ranking">排行榜</a>
          <a class="nav-item" data-page="downloads">下载</a>
          <a class="nav-item" data-page="favorites">收藏</a>
          <a class="nav-item" data-page="settings">设置</a>
        </nav>
        <div class="masthead-actions">
          <div class="search-strip">
            <input type="text" id="searchInput" placeholder="搜索漫画、作者...">
            <button id="searchBtn" class="search-btn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
              </svg>
            </button>
          </div>
          <div class="user-badge" id="loginStatus" onclick="showLoginModal()">
            <span class="badge-icon">○</span>
            <span class="badge-text">登录</span>
          </div>
        </div>
      </div>
    </header>

    <main class="main-content">
      <section id="page-dashboard" class="page active">
        <div class="page-header">
          <h1 class="page-title">仪表盘</h1>
          <div class="title-decoration"></div>
        </div>
        <div class="quick-nav-grid">
          <div class="quick-card" onclick="navigateTo('ranking')">
            <div class="card-stripe"></div>
            <div class="card-body">
              <span class="card-label">HOT</span>
              <h3 class="card-title">热门排行</h3>
              <p class="card-desc">今日 · 本周 · 本月</p>
            </div>
          </div>
          <div class="quick-card" onclick="navigateTo('downloads')">
            <div class="card-stripe stripe-alt"></div>
            <div class="card-body">
              <span class="card-label">DL</span>
              <h3 class="card-title">下载管理</h3>
              <p class="card-desc">任务队列 · 进度追踪</p>
            </div>
          </div>
          <div class="quick-card" onclick="navigateTo('favorites')">
            <div class="card-stripe stripe-fav"></div>
            <div class="card-body">
              <span class="card-label">FAV</span>
              <h3 class="card-title">我的收藏</h3>
              <p class="card-desc">个人书架</p>
            </div>
          </div>
        </div>
        <div class="section-block">
          <h2 class="section-title">快速入口</h2>
          <div class="tag-cloud" id="quickTags"></div>
        </div>
      </section>

      <section id="page-ranking" class="page">
        <div class="page-header">
          <h1 class="page-title">排行榜</h1>
          <div class="title-decoration"></div>
        </div>
        <div class="rank-tabs">
          <button class="rank-tab active" data-type="day">今日</button>
          <button class="rank-tab" data-type="week">本周</button>
          <button class="rank-tab" data-type="month">本月</button>
        </div>
        <div class="manga-grid" id="rankingGrid"></div>
        <div class="page-nav" id="rankingPagination"></div>
      </section>

      <section id="page-search" class="page">
        <div class="page-header">
          <h1 class="page-title">搜索结果</h1>
          <div class="title-decoration"></div>
        </div>
        <div class="filter-bar">
          <select id="searchType" class="filter-select">
            <option value="all">全部类型</option>
            <option value="author">按作者</option>
            <option value="tag">按标签</option>
          </select>
        </div>
        <div class="manga-grid" id="searchGrid"></div>
        <div class="page-nav" id="searchPagination"></div>
      </section>

      <section id="page-detail" class="page">
        <button class="back-link" onclick="goBack()">← 返回列表</button>
        <div id="albumDetail"></div>
      </section>

      <section id="page-downloads" class="page">
        <div class="page-header">
          <h1 class="page-title">下载管理</h1>
          <div class="title-decoration"></div>
        </div>
        <div class="dl-input-row">
          <input type="text" id="downloadAlbumId" class="dl-input" placeholder="输入漫画 ID...">
          <select id="downloadFormatSelectGlobal" class="dl-select">
            <option value="folder">图片文件夹</option>
            <option value="zip">ZIP 压缩包</option>
          </select>
          <button id="startDownloadBtn" class="dl-btn">添加任务</button>
        </div>
        <div class="dl-list" id="downloadList"></div>
      </section>

      <section id="page-favorites" class="page">
        <div class="page-header">
          <h1 class="page-title">收藏夹</h1>
          <div class="title-decoration"></div>
        </div>
        <div id="favoritesStatus"></div>
        <div class="manga-grid" id="favoriteGrid"></div>
        <div class="page-nav" id="favoritePagination"></div>
      </section>

      <section id="page-settings" class="page">
        <div class="page-header">
          <h1 class="page-title">设置</h1>
          <div class="title-decoration"></div>
        </div>
        <div class="settings-panel">
          <div class="settings-block">
            <h3 class="block-title">客户端配置</h3>
            <div class="setting-row">
              <label class="setting-label">客户端类型</label>
              <select id="settingClientImpl" class="setting-input">
                <option value="html">网页端</option>
                <option value="api">APP端</option>
              </select>
            </div>
            <div class="setting-row">
              <label class="setting-label">下载目录</label>
              <input type="text" id="settingBaseDir" class="setting-input" placeholder="D:/jmcomic">
            </div>
            <div class="setting-row">
              <label class="setting-label">目录规则</label>
              <input type="text" id="settingDirRule" class="setting-input" value="Bd_Aauthor_Atitle">
            </div>
            <div class="setting-row">
              <label class="setting-label">并发数</label>
              <input type="number" id="settingImageThread" class="setting-input" value="3" min="1" max="20">
            </div>
          </div>
          <div class="settings-block">
            <h3 class="block-title">界面设置</h3>
            <div class="setting-row">
              <label class="setting-label">列表封面</label>
              <input type="checkbox" id="settingShowListCover" class="setting-checkbox">
            </div>
            <div class="setting-row">
              <label class="setting-label">详情封面</label>
              <input type="checkbox" id="settingShowDetailCover" class="setting-checkbox">
            </div>
          </div>
          <div class="settings-block">
            <h3 class="block-title">配置文件</h3>
            <textarea id="configEditor" class="config-textarea" rows="12"></textarea>
            <button id="saveConfigBtn" class="save-btn">保存配置</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div id="page-reader" class="reader-screen hidden">
    <div class="reader-toolbar" id="reader-toolbar">
      <div class="toolbar-top">
        <button class="toolbar-btn" id="reader-btn-back" title="返回">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
        </button>
        <span class="toolbar-title" id="reader-toolbar-title">漫画阅读器</span>
        <div class="toolbar-actions">
          <button class="toolbar-btn" id="reader-btn-zoom-out" title="缩小">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607zM13.5 10.5h-6"/></svg>
          </button>
          <span class="zoom-level" id="reader-zoom-level">100%</span>
          <button class="toolbar-btn" id="reader-btn-zoom-in" title="放大">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607zM10.5 7.5v6m3-3h-6"/></svg>
          </button>
          <button class="toolbar-btn" id="reader-btn-theme" title="切换主题">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"/></svg>
          </button>
          <button class="toolbar-btn" id="reader-btn-fullscreen" title="全屏">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75h-4.5m4.5 0v4.5m0-4.5L15 9m5.25 11.25h-4.5m4.5 0v-4.5m0 4.5L15 15"/></svg>
          </button>
        </div>
      </div>
    </div>

    <div class="reader-container" id="reader-container">
      <div class="image-list" id="reader-image-list"></div>
    </div>

    <div class="reader-progress-bar" id="reader-progress-bar">
      <div class="reader-progress-fill" id="reader-progress-fill"></div>
      <div class="reader-progress-thumb" id="reader-progress-thumb"></div>
    </div>

    <div class="reader-bottom-bar">
      <span class="page-info" id="reader-page-info">1 / 1</span>
      <button class="toolbar-btn" id="reader-btn-thumbnails" title="缩略图">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z"/></svg>
      </button>
    </div>
  </div>

  <div class="reader-thumbnail-panel hidden" id="reader-thumbnail-panel">
    <div class="thumbnail-header">
      <span class="thumbnail-title">缩略图导航</span>
      <button class="toolbar-btn" id="reader-btn-close-thumbnails">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="thumbnail-grid" id="reader-thumbnail-grid"></div>
  </div>

  <div class="reader-loading-overlay hidden" id="reader-loading">
    <div class="loading-spinner"></div>
    <span class="loading-text">加载中...</span>
  </div>

  <div id="loginModal" class="modal-overlay" style="display:none;">
    <div class="modal-frame">
      <div class="modal-top">
        <span class="modal-kanji">登</span>
        <span class="modal-close" onclick="hideLoginModal()">×</span>
      </div>
      <div class="modal-body">
        <div class="form-field">
          <label>用户名</label>
          <input type="text" id="loginUsername" placeholder="用户名或邮箱">
        </div>
        <div class="form-field">
          <label>密码</label>
          <input type="password" id="loginPassword" placeholder="密码">
        </div>
        <div class="form-field">
          <label>客户端</label>
          <select id="loginImpl">
            <option value="html">网页端</option>
            <option value="api">APP端</option>
          </select>
        </div>
        <div id="loginError" class="form-error"></div>
      </div>
      <div class="modal-foot">
        <button class="btn-ghost" onclick="hideLoginModal()">取消</button>
        <button class="btn-primary" id="loginConfirmBtn">确认登录</button>
      </div>
    </div>
  </div>

  <script src="/static/js/reader/config.js"></script>
  <script src="/static/js/reader/utils.js"></script>
  <script src="/static/js/reader/lazy-loader.js"></script>
  <script src="/static/js/reader/progress.js"></script>
  <script src="/static/js/reader/zoom.js"></script>
  <script src="/static/js/reader/toolbar.js"></script>
  <script src="/static/js/reader/thumbnail.js"></script>
  <script src="/static/js/reader/keyboard.js"></script>
  <script src="/static/js/reader/gesture.js"></script>
  <script src="/static/js/reader/index.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
